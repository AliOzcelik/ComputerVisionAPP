  <script>
    // Suppress benign ResizeObserver loop warning (browser quirk, not a real error)
    (function() {
      const FILTER = 'ResizeObserver loop';
      // 1. window.onerror
      window.onerror = function(msg) {
        if (typeof msg === 'string' && msg.includes(FILTER)) return true;
        return false;
      };
      // 2. error event (capture phase, before any framework hooks)
      window.addEventListener('error', (e) => {
        if (e.message && e.message.includes(FILTER)) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
      // 3. console.error filtering
      const _origErr = console.error;
      console.error = function(...args) {
        if (args.length && typeof args[0] === 'string' && args[0].includes(FILTER)) return;
        return _origErr.apply(this, args);
      };
      // 4. Wrap ResizeObserver with rAF deferral so callbacks don't reenter
      const _RO = window.ResizeObserver;
      if (_RO) {
        window.ResizeObserver = class extends _RO {
          constructor(cb) {
            let raf = 0;
            super((entries, observer) => {
              if (raf) cancelAnimationFrame(raf);
              raf = requestAnimationFrame(() => {
                raf = 0;
                try { cb(entries, observer); } catch (e) {
                  if (!String(e).includes(FILTER)) throw e;
                }
              });
            });
          }
        };
      }
    })();
  </script>
